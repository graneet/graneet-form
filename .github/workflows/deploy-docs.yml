name: Deploy Docs

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Build docs
        run: pnpm build:docs

      - name: Deploy preview
        if: github.event_name == 'pull_request'
        run: npx --yes netlify-cli deploy --dir=apps/docs/.output/public --functions=apps/docs/.netlify/functions-internal --alias=pr-${{ github.event.number }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy production
        if: github.ref == 'refs/heads/main'
        run: npx --yes netlify-cli deploy --dir=apps/docs/.output/public --functions=apps/docs/.netlify/functions-internal --prod --message="${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
